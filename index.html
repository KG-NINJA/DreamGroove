<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>KG Voice Log</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #f5f7fb;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
      --ok: #43c97b;
      --err: #ff6b6b;
      --border: #2a3140;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px;
    }

    p.note {
      color: var(--muted);
      margin: 0 0 20px;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    select,
    textarea,
    button {
      width: 100%;
      font: inherit;
      border-radius: 12px;
    }

    select,
    textarea {
      background: #0d1016;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.6;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    button {
      border: 0;
      padding: 16px;
      background: var(--accent);
      color: #081120;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #2a3140;
      color: var(--text);
    }

    #status {
      margin-top: 12px;
      min-height: 1.5em;
      color: var(--muted);
      word-break: break-word;
    }

    .ok { color: var(--ok) !important; }
    .err { color: var(--err) !important; }

    .preview {
      white-space: pre-wrap;
      background: #0d1016;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      min-height: 120px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>KG Voice Log</h1>
    <p class="note">
      iPhoneの音声キーボードで話して、送信するとCloudflare R2にMarkdownで保存します。
    </p>

    <div class="panel">
      <div class="row">
        <div>
          <label for="tag">Tag</label>
          <select id="tag">
            <option value="voice">voice</option>
            <option value="idea">idea</option>
            <option value="memo">memo</option>
          </select>
        </div>

        <div>
          <label for="input">Input</label>
          <textarea id="input" placeholder="ここをタップして、iPhoneのマイクで音声入力"></textarea>
        </div>

        <button id="sendBtn" type="button">Cloudflareに送信</button>
        <button id="previewBtn" class="secondary" type="button">Markdownプレビュー更新</button>

        <div id="status"></div>
      </div>
    </div>

    <div class="panel">
      <label>Markdown Preview</label>
      <div id="preview" class="preview"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://dreamgroove1.fuwafuwow.workers.dev/";
    const API_KEY = "mysecret123";

    const input = document.getElementById("input");
    const tag = document.getElementById("tag");
    const sendBtn = document.getElementById("sendBtn");
    const previewBtn = document.getElementById("previewBtn");
    const preview = document.getElementById("preview");
    const statusEl = document.getElementById("status");

    function nowIso() {
      return new Date().toISOString();
    }

    function buildMarkdown(text, selectedTag, timestamp) {
      return `# Voice Note

${text}

---
time: ${timestamp}
tag: ${selectedTag}
source: iphone
`;
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = type;
    }

    function refreshPreview() {
      const text = input.value.trim();
      const selectedTag = tag.value;
      const timestamp = nowIso();

      if (!text) {
        preview.textContent = "";
        return;
      }

      preview.textContent = buildMarkdown(text, selectedTag, timestamp);
    }

    previewBtn.addEventListener("click", refreshPreview);

    sendBtn.addEventListener("click", async () => {
      const text = input.value.trim();
      const selectedTag = tag.value;
      const timestamp = nowIso();

      if (!text) {
        setStatus("入力が空です。", "err");
        return;
      }

      const markdown = buildMarkdown(text, selectedTag, timestamp);
      preview.textContent = markdown;
      setStatus("送信中...");

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": API_KEY,
          },
          body: JSON.stringify({
            content: text,
            tag: selectedTag,
            timestamp: timestamp,
          }),
        });

        const resultText = await res.text();

        if (!res.ok) {
          setStatus(`送信失敗: ${resultText}`, "err");
          return;
        }

        setStatus(`保存完了: ${resultText}`, "ok");
        input.value = "";
      } catch (e) {
        setStatus("通信エラー: " + e.message, "err");
      }
    });

    input.addEventListener("input", refreshPreview);
    refreshPreview();
  </script>
</body>
</html>
