<script>
const button = document.getElementById("recordButton");

let pressTimer = null;
let isPressing = false;

// 入力エリアを動的に作る
const textarea = document.createElement("textarea");
textarea.placeholder = "押しながら話す（マイクボタン）";
textarea.style.width = "100%";
textarea.style.height = "100px";
textarea.style.marginTop = "10px";

document.querySelector(".app").appendChild(textarea);

// 長押し開始
button.addEventListener("touchstart", () => {
  isPressing = true;
  textarea.focus();

  document.getElementById("status").textContent = "🎤 入力中...";
});

// 長押し終了
button.addEventListener("touchend", async () => {
  if (!isPressing) return;
  isPressing = false;

  const text = textarea.value.trim();

  document.getElementById("status").textContent = "送信中...";

  if (!text) return;

  try {
    const res = await fetch("https://dreamgroove1.fuwafuwow.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "mysecret123"
      },
      body: JSON.stringify({
        content: text,
        tag: "voice",
        timestamp: new Date().toISOString()
      })
    });

    const result = await res.text();

    document.getElementById("status").textContent = "保存完了: " + result;

    textarea.value = "";

  } catch (e) {
    document.getElementById("status").textContent = "エラー";
  }
});
</script>
