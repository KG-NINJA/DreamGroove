<button id="ptt">🎤 押して話す</button>
<textarea id="output" rows="10" style="width:100%"></textarea>

<script>
let recognition;
let isPressing = false;
let buffer = "";

const btn = document.getElementById("ptt");
const output = document.getElementById("output");

if (!('webkitSpeechRecognition' in window)) {
  alert("音声認識非対応");
} else {
  recognition = new webkitSpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (event) => {
    if (!isPressing) return;

    const text = event.results[0][0].transcript;
    buffer += text + "\n";
    output.value = buffer;
  };
}

// 🎤 押す
function startPTT() {
  if (isPressing) return;
  isPressing = true;
  buffer = "";

  try {
    recognition.start();
  } catch(e) {}
}

// 🛑 離す → 即保存（ここが核心）
async function stopPTT() {
  isPressing = false;
  recognition.stop();

  if (!buffer.trim()) return;

  const timestamp = new Date().toISOString();

  // 🔥 Markdown生成
  const markdown = `# Voice Note

${buffer}

---
time: ${timestamp}
tag: voice
source: browser
`;

  // 🔥 Cloudflare送信
  try {
    const res = await fetch("https://dreamgroove1.fuwafuwow.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "ここにAPIキー"
      },
      body: JSON.stringify({
        content: buffer,
        tag: "voice",
        timestamp: timestamp
      })
    });

    const data = await res.json();
    console.log("saved:", data);

  } catch (e) {
    console.error("save error:", e);
  }
}

// PC
btn.addEventListener("mousedown", startPTT);
btn.addEventListener("mouseup", stopPTT);

// スマホ
btn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  startPTT();
});

btn.addEventListener("touchend", (e) => {
  e.preventDefault();
  stopPTT();
});
</script>
