<button onclick="saveToDream()">保存</button>

<script>
async function saveToDream() {
  const content = document.querySelector("#output").value;

  const res = await fetch("https://dreamgroove1.fuwafuwow.workers.dev/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "mysecret123"
    },
    body: JSON.stringify({
      content: content,
      tag: "voice",
      timestamp: new Date().toISOString()
    })
  });

  const data = await res.json();
  console.log(data);
  alert("保存：" + data.file);
}
</script>
